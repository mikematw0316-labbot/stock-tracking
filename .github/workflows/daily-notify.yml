name: Daily LINE Notify

on:
  schedule:
    - cron: '30 6 * * *'   # 14:30 台灣時間
  workflow_dispatch:
    inputs:
      dry_run:
        description: '不發送 LINE 推播（僅預覽）'
        type: boolean
        default: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send LINE notifications
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: node notify.js ${{ (github.event.inputs.dry_run == 'true') && '--dry-run' || '' }}
