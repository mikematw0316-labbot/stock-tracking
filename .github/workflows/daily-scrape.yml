name: Daily Scrape & LINE Notify

on:
  schedule:
    # 每天 06:00 UTC = 台灣時間 14:00
    - cron: '0 6 * * *'
  workflow_dispatch:  # 手動觸發

permissions:
  contents: write

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape prices & dividends
        run: node scraper.js

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache.json
          git diff --staged --quiet || git commit -m "chore: update price cache $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Send LINE notifications
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USERS_JSON: ${{ secrets.LINE_USERS_JSON }}
        run: node notify.js
