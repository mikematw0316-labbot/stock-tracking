name: Daily Scrape

on:
  schedule:
    - cron: '0 23 * * *'   # 07:00 台灣時間
    - cron: '0 3 * * *'    # 11:00 台灣時間
    - cron: '0 6 * * *'    # 14:00 台灣時間
    - cron: '0 13 * * *'   # 21:00 台灣時間
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape prices & dividends
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: node scraper.js

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache.json
          git diff --staged --quiet || git commit -m "chore: update price cache $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
